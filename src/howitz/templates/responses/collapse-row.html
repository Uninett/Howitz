{% if is_selected %}
    {% with id=id, event=event %}
        {% include "/components/row/selected-event-row.html" %}
    {% endwith %}
{% else %}
    {% with id=id, event=event %}
        {% include "/components/row/event-row.html" %}
    {% endwith %}
{% endif %}

<tr
        id="event-details-row-{{ id }}"
        class="bg-white border-b dark:bg-gray-900 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600"
        hx-swap-oob="delete"

>
</tr>
